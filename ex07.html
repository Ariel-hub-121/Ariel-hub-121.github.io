<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Student Table</title>
  <style>
    table {
      border-collapse: collapse; 
      width: 50%;              
    }
    table, th, td {
      border: 1px solid black; 
    }
    th, td {
      padding: 5px;            
      text-align: left;         
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>Name</th>
      <th>Student ID</th>
    </tr>
    <tr>
      <td>李思妤</td>
      <td>113403529</td>
    </tr>
  </table>

</body>
</html>
