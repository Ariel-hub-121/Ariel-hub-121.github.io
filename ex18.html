<!DOCTYPE html>
<html>
<head>
  <style>
   
    .h1-style {
      text-decoration: overline; 
      text-shadow: 2px 2px 5px pink; 
      font-size: 40px;
    }


    .h2-style {
      font-style: italic; 
      border: 1px solid black; 
      outline: 2px solid yellow; 
      outline-offset: 5px; 
      margin: 20px; 
      font-size: 30px;
    }

    .h3-style {
      text-align: right; 
      text-decoration: underline; 
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1 class="h1-style">This is heading 1</h1>
  <h2 class="h2-style">This is heading 2</h2>
  <h3 class="h3-style">This is heading 3</h3>

</body>
</html>
