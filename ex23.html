<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex23</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f6f6f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .container {
            width: 496px; /* 根據圖片標註的寬度 */
            background: #ffffff;
            border: 1px solid #ddd;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .preview-area {
            position: relative;
            text-align: center;
            margin-bottom: 20px;
        }

        .main-image {
            width: 450px;
            height: 240px;
            background-color: #e0e0e0; /* 若無圖片則顯示灰色區塊 */
            object-fit: cover;
            border: 1px solid #ccc;
        }

        /* --- 嚴格遵循 Design Spec 的按鈕樣式 --- */
        .spec-button {
            /* 尺寸規格 (size: h22 / R8) */
            height: 22px;
            border-radius: 8px;
            
            /* 顏色規格 (background #ffffff / outline 1px #2f2f2f) */
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            
            /* 字體規格 (Roboto Regular 13px / color #2f2f2f) */
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #2f2f2f;
            
            /* 排版與互動 */
            cursor: pointer;
            padding: 0 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: background-color 0.2s;
            
            /* 定位 (示意設計稿中的位置) */
            margin-top: 10px;
        }

        .spec-button:hover {
            background-color: #f0f0f0;
        }

        /* 詳細資訊區塊樣式 */
        .details-panel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eaeaea;
            font-size: 13px;
            color: #707070;
            line-height: 1.8;
            /* 預設隱藏 */
            display: none; 
        }

        /* 當此 class 被加入時顯示資訊 */
        .details-panel.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="preview-area">
            <img src="https://via.placeholder.com/450x240/D4AF37/FFFFFF?text=Preview+Image" alt="預覽圖" class="main-image">
            <br>
            <button id="infoBtn" class="spec-button">查看資訊</button>
        </div>

        <div id="details" class="details-panel">
            <strong>詳細資訊：</strong><br>
            修改日期：2017/10/12<br>
            檔案類型：JPG<br>
            檔案大小：466.97KB<br>
            儲存路徑：\\designcenter.qnap.com.tw\DesignCenter\PM-RD...
        </div>
    </div>

    <script>
        const btn = document.getElementById('infoBtn');
        const details = document.getElementById('details');

        btn.addEventListener('click', function() {
            // 切換顯示狀態
            if (details.style.display === "block") {
                details.style.display = "none";
                this.textContent = "查看資訊";
            } else {
                details.style.display = "block";
                this.textContent = "收起資訊";
            }
        });
    </script>

</body>
</html>
