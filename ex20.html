<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Web Page Assignment</title>
    <style>
        /* 整體背景與容器設定 */
        body {
            background-color: #f0f0f0;
            padding: 50px;
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            min-height: 200px;
            display: flex;
        }

        /* 表格樣式設定 */
        table {
            border-collapse: collapse;
            width: 250px;
            text-align: left;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
        }

        /* 表頭灰色背景與白色文字 */
        th {
            background-color: #777;
            color: white;
        }

        /* 使用 nth-child 設定奇數列為黃色背景 (1, 3 列) */
        tr:nth-child(odd) td {
            background-color: yellow;
        }

        /* 偶數列保持白色背景 (2 列) */
        tr:nth-child(even) td {
            background-color: white;
        }

        /* 右側固定定位的 div */
        .fixed-box {
            position: fixed;
            top: 70px;
            right: 150px;
            width: 120px;
            height: 100px;
            border: 3px solid #7eb11a; /* 綠色邊框 */
            padding: 10px;
            background-color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
